<!DOCTYPE html>
<html class="dark" lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Личный кабинет — ЖЕЛЕЗНЫЙ ДРОВОСЕК</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "outline-variant":"#534347","surface-container-lowest":"#0f0e0c",
        "surface-container-highest":"#373431","primary-container":"#cf7498",
        "surface-container-high":"#2c2a27","on-surface-variant":"#d7c1c7",
        "on-surface":"#e7e2dd","surface-container-low":"#1d1b19",
        "surface-container":"#211f1d","primary":"#ffb0cc","surface":"#151311",
        "on-background":"#e7e2dd","on-primary":"#5a1536","background":"#151311",
        "outline":"#a08c91"
      },
      spacing: {
        "margin-edge":"64px",
        "margin-edge-mobile":"20px",
        "section-gap":"160px",
        "section-gap-mobile":"80px",
        "gutter":"24px",
        "container-max":"1440px"
      },
      fontFamily: {"body-md":["Inter", "sans-serif"],"label-caps":["Space Grotesk", "sans-serif"],"headline-md":["Space Grotesk", "sans-serif"],"display-xl":["Space Grotesk", "sans-serif"]},
      fontSize: {
        "body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],
        "label-caps":["14px",{"lineHeight":"20px","letterSpacing":"0.1em","fontWeight":"600"}],
        "body-lg":["18px",{"lineHeight":"28px","fontWeight":"400"}],
        "headline-md":["48px",{"lineHeight":"56px","fontWeight":"500"}],
        "display-xl":["80px",{"lineHeight":"80px","letterSpacing":"-0.04em","fontWeight":"700"}]
      }

    }
  }
}
</script>
<style>
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24}
body{background-color:#151311;color:#e7e2dd;-webkit-font-smoothing:antialiased}
.glass-panel{background:rgba(21,19,17,0.7);backdrop-filter:blur(20px);border:1px solid rgba(238,238,238,0.05)}
.fade-in{animation:fadeIn .6s cubic-bezier(.16,1,.3,1) both}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
<script src="/js/shared-ui.js"></script>
</head>
<body class="font-body-md bg-background text-on-background selection:bg-primary selection:text-on-primary">

<main class="pt-24 md:pt-40 pb-16 md:pb-24 max-w-container-max mx-auto px-margin-edge-mobile md:px-margin-edge min-h-[80vh]">

    <div id="cabinetLoading" class="flex items-center justify-center py-32">
        <span class="material-symbols-outlined animate-spin text-primary text-4xl">progress_activity</span>
    </div>

    <div id="cabinetContent" class="hidden fade-in space-y-8 md:space-y-12">
        <header class="flex flex-col md:flex-row justify-between md:items-end border-b border-outline-variant/20 pb-8 gap-6">
            <div>
                <h1 class="text-[48px] md:text-[64px] font-display-xl uppercase leading-none mb-4 tracking-tight">КАБИНЕТ</h1>
                <p class="text-on-surface-variant font-label-caps text-xs md:text-sm uppercase tracking-widest">УПРАВЛЕНИЕ ПРОФИЛЕМ И ИСТОРИЯ ЗАКАЗОВ</p>
            </div>
            <div class="md:text-right border-l-2 md:border-l-0 md:border-r-2 border-primary pl-4 md:pl-0 md:pr-4">
                <span id="userRoleBadge" class="inline-block px-3 py-1 bg-primary/20 text-primary border border-primary/30 font-label-caps text-[10px] mb-2 uppercase tracking-widest">КЛИЕНТ</span>
                <div id="userEmailDisplay" class="text-on-surface-variant font-body-md text-sm md:text-base"></div>
            </div>
        </header>


        <div class="grid grid-cols-12 gap-gutter">
            <!-- Sidebar / Stats -->
            <div class="col-span-12 lg:col-span-3 space-y-6">
                <div class="glass-panel p-6 md:p-8 space-y-4 bg-surface-container/20 border border-outline-variant/10">
                    <h3 class="font-label-caps text-label-caps text-primary border-b border-outline-variant/10 pb-2 mb-4 tracking-widest uppercase">ВАШИ ДАННЫЕ</h3>
                    <div class="space-y-1">
                        <p class="text-[9px] md:text-[10px] text-on-surface-variant uppercase tracking-widest">ИМЯ / ОРГАНИЗАЦИЯ</p>
                        <p id="userNameDisplay" class="font-semibold text-base md:text-lg text-on-surface"></p>
                    </div>
                    <div class="space-y-1">
                        <p class="text-[9px] md:text-[10px] text-on-surface-variant uppercase tracking-widest">ТЕЛЕФОН</p>
                        <p id="userPhoneDisplay" class="font-semibold text-base md:text-lg text-on-surface">Не указан</p>
                    </div>
                </div>
                
                <button onclick="handleLogoutGlobal(); window.location.href='/hi_tech_style/code.html';" class="w-full py-4 border border-error/30 text-error font-label-caps text-[11px] md:text-label-caps hover:bg-error hover:text-surface transition-all uppercase tracking-widest">ВЫЙТИ ИЗ СИСТЕМЫ</button>
            </div>


            <!-- Main Content -->
            <div class="col-span-12 lg:col-span-9 space-y-12">
                
                <!-- Profile Editor -->
                <section class="glass-panel p-6 md:p-10 space-y-8 bg-surface-container/20">
                    <div class="flex justify-between items-center border-b border-outline-variant/10 pb-4">
                        <h2 class="font-headline-md text-xl md:text-2xl uppercase tracking-tight">ДАННЫЕ ОРГАНИЗАЦИИ / ПРОФИЛЬ</h2>
                        <span class="material-symbols-outlined text-primary/40">business_center</span>
                    </div>
                    
                    <form id="profileForm" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">ФИО представителя</label>
                            <input type="text" name="name" id="editName" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="Введите ваше имя">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">Контактный телефон</label>
                            <input type="text" name="phone" id="editPhone" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="+7 (___) ___-__-__">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">Название компании</label>
                            <input type="text" name="company_name" id="editCompany" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="ООО 'МеталлПром'">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">ИНН</label>
                            <input type="text" name="inn" id="editInn" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="10 или 12 цифр">
                        </div>
                        <div class="space-y-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">КПП</label>
                            <input type="text" name="kpp" id="editKpp" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="9 цифр">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-[10px] text-on-surface-variant uppercase tracking-widest block">Юридический адрес</label>
                            <input type="text" name="legal_address" id="editLegalAddress" class="w-full bg-surface-container-low border-outline-variant/20 focus:border-primary text-on-surface font-body-md py-3 px-4 outline-none transition-all" placeholder="г. Москва, ул. ...">
                        </div>
                        <div class="md:col-span-2 pt-4">
                            <button type="submit" id="saveProfileBtn" class="w-full md:w-auto px-12 py-4 bg-primary text-on-primary font-label-caps text-label-caps tracking-widest hover:brightness-110 transition-all flex items-center justify-center gap-2">
                                СОХРАНИТЬ ИЗМЕНЕНИЯ
                                <span class="material-symbols-outlined text-sm">save</span>
                            </button>
                        </div>
                    </form>
                </section>

                <section>
                    <div class="flex items-center gap-4 mb-8">
                        <h2 class="font-headline-md text-2xl md:text-3xl uppercase tracking-tight">ИСТОРИЯ ЗАКАЗОВ</h2>
                        <div class="h-px flex-1 bg-outline-variant/20"></div>
                    </div>
                    <div id="ordersList" class="space-y-6">
                        <!-- Orders injected here -->
                    </div>
                </section>
            </div>
        </div>
    </div>

    <div id="cabinetError" class="hidden text-center py-32 space-y-6">
        <span class="material-symbols-outlined text-error text-6xl">error</span>
        <h2 class="text-2xl font-bold uppercase">ДОСТУП ОГРАНИЧЕН</h2>
        <p class="text-on-surface-variant max-w-md mx-auto">Для просмотра этой страницы необходимо войти в свой аккаунт.</p>
        <button onclick="toggleAuthModalGlobal()" class="px-12 py-4 bg-primary text-on-primary font-label-caps text-label-caps tracking-widest">ВОЙТИ</button>
    </div>
</main>

<script>
async function loadCabinet() {
    const token = localStorage.getItem('metal_token');
    if (!token) {
        document.getElementById('cabinetLoading').classList.add('hidden');
        document.getElementById('cabinetError').classList.remove('hidden');
        return;
    }

    try {
        const res = await fetch('/api/auth/me', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (res.ok) {
            const user = await res.json();
            document.getElementById('userNameDisplay').textContent = user.name || 'Не указано';
            document.getElementById('userPhoneDisplay').textContent = user.phone || 'Не указано';
            document.getElementById('userEmailDisplay').textContent = user.email;
            document.getElementById('userRoleBadge').textContent = user.role;
            
            // Fill form
            document.getElementById('editName').value = user.name || '';
            document.getElementById('editPhone').value = user.phone || '';
            document.getElementById('editCompany').value = user.company_name || '';
            document.getElementById('editInn').value = user.inn || '';
            document.getElementById('editKpp').value = user.kpp || '';
            document.getElementById('editLegalAddress').value = user.legal_address || '';
            
            document.getElementById('cabinetLoading').classList.add('hidden');
            document.getElementById('cabinetContent').classList.remove('hidden');

            loadOrders();
        } else {
            throw new Error('Unauthorized');
        }
    } catch (e) {
        document.getElementById('cabinetLoading').classList.add('hidden');
        document.getElementById('cabinetError').classList.remove('hidden');
    }
}

document.getElementById('profileForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('saveProfileBtn');
    const originalText = btn.innerHTML;
    const token = localStorage.getItem('metal_token');
    
    btn.disabled = true;
    btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-sm">progress_activity</span> СОХРАНЕНИЕ...';
    
    const formData = new FormData(e.target);
    const data = Object.fromEntries(formData.entries());
    
    try {
        const res = await fetch('/api/auth/profile', {
            method: 'PUT',
            headers: { 
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(data)
        });
        
        if (res.ok) {
            btn.classList.replace('bg-primary', 'bg-green-600');
            btn.innerHTML = '<span class="material-symbols-outlined text-sm">check_circle</span> СОХРАНЕНО';
            
            // Update sidebar info
            document.getElementById('userNameDisplay').textContent = data.name || data.company_name || 'Не указано';
            document.getElementById('userPhoneDisplay').textContent = data.phone || 'Не указано';
            
            setTimeout(() => {
                btn.classList.replace('bg-green-600', 'bg-primary');
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 2000);
        } else {
            alert('Ошибка при сохранении профиля');
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    } catch (err) {
        console.error(err);
        btn.innerHTML = originalText;
        btn.disabled = false;
    }
});

async function loadOrders() {
    const token = localStorage.getItem('metal_token');
    const container = document.getElementById('ordersList');
    
    try {
        const res = await fetch('/api/orders/my', {
            headers: { 'Authorization': 'Bearer ' + token }
        });
        
        if (res.ok) {
            const orders = await res.json();
            
            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-16 border border-dashed border-outline-variant/30 group">
                        <span class="material-symbols-outlined text-4xl text-outline-variant/30 mb-4 group-hover:text-primary transition-colors">shopping_bag</span>
                        <p class="text-on-surface-variant uppercase tracking-widest text-xs">У вас пока нет оформленных заказов</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => {
                const date = new Date(order.created_at).toLocaleDateString('ru-RU', {
                    day: '2-digit', month: 'long', year: 'numeric', hour: '2-digit', minute: '2-digit'
                });
                
                const itemsList = order.items.map(item => `
                    <div class="flex justify-between items-center py-2 border-b border-outline-variant/5 last:border-0">
                        <div class="flex flex-col">
                            <span class="text-on-surface font-medium text-sm uppercase">${item.name}</span>
                            <span class="text-[10px] text-on-surface-variant uppercase tracking-widest">Кол-во: ${item.quantity}</span>
                        </div>
                        <span class="text-sm font-bold text-primary">${(item.price * item.quantity).toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₽</span>
                    </div>
                `).join('');

                return `
                    <div class="glass-panel overflow-hidden border border-outline-variant/10 group hover:border-primary/20 transition-all duration-300">
                        <div class="p-4 md:p-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-surface-container/30">
                            <div>
                                <div class="flex items-center gap-3 mb-1">
                                    <span class="font-display-xl text-lg md:text-xl uppercase">ЗАКАЗ #${order.id}</span>
                                    <span class="px-2 py-0.5 bg-primary/10 text-primary border border-primary/20 font-label-caps text-[9px] uppercase tracking-widest">${order.status === 'pending' ? 'В ОБРАБОТКЕ' : order.status}</span>
                                </div>
                                <p class="text-[10px] text-on-surface-variant uppercase tracking-widest">${date}</p>
                            </div>
                            <div class="text-left md:text-right w-full md:w-auto border-t md:border-t-0 border-outline-variant/10 pt-4 md:pt-0">
                                <p class="text-[9px] text-on-surface-variant uppercase tracking-widest mb-1">ИТОГО К ОПЛАТЕ</p>
                                <p class="text-xl md:text-2xl font-display-xl text-primary leading-none">${order.total.toLocaleString('ru-RU', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} ₽</p>
                            </div>
                        </div>
                        <div class="p-4 md:p-6 space-y-2 bg-surface/40">
                            <p class="font-label-caps text-[10px] text-on-surface-variant uppercase tracking-widest border-b border-outline-variant/10 pb-2 mb-2">СОСТАВ ЗАКАЗА</p>
                            ${itemsList}
                        </div>
                        <div class="px-6 py-3 bg-primary/5 flex justify-between items-center">
                            <span class="text-[10px] text-on-surface-variant uppercase tracking-widest italic">Мы свяжемся с вами по тел: ${order.customer_phone}</span>
                            <span class="material-symbols-outlined text-primary/30 group-hover:text-primary transition-colors text-sm">contact_phone</span>
                        </div>
                    </div>
                `;
            }).join('');
        }
    } catch (e) {
        console.error('Failed to load orders', e);
        container.innerHTML = '<p class="text-error text-center py-12 uppercase tracking-widest text-xs font-bold">Ошибка загрузки истории заказов</p>';
    }
}

document.addEventListener('DOMContentLoaded', loadCabinet);
</script>
</body>
</html>
