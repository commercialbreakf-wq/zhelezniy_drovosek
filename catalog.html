<meta charset="utf-8"/>

tailwind.config = {

        "surface-tint":"#ffb0cc","on-surface":"#e7e2dd","surface-container-low":"#1d1b19",
        "surface-container":"#211f1d","primary":"#ffb0cc","surface":"#151311",
        "on-background":"#e7e2dd","on-primary":"#5a1536","background":"#151311",

<body class="bg-background text-on-background font-body-md selection:bg-primary selection:text-on-primary">

<!-- Shared Header -->

<main class="pt-24 md:pt-32 pb-16 md:pb-24 max-w-container-max mx-auto px-margin-edge-mobile md:px-margin-edge">

<!-- Breadcrumbs & Search -->
<div class="flex flex-col md:flex-row md:items-center justify-between mb-8 md:mb-12 gap-6">
<nav id="breadcrumbs" class="flex items-center gap-2 font-label-caps text-[11px] md:text-[12px] text-on-surface-variant overflow-x-auto whitespace-nowrap pb-2 md:pb-0">
<a class="hover:text-primary transition-colors no-underline" href="/">ГЛАВНАЯ</a>
<span class="material-symbols-outlined text-[14px]">chevron_right</span>
<span class="cursor-pointer hover:text-primary transition-colors" onclick="resetFilters()">КАТАЛОГ</span>
</nav>
<div class="relative w-full md:w-96">
<input id="searchInput" class="w-full bg-transparent border-b border-outline-variant/30 focus:border-primary outline-none py-2 px-0 font-label-caps text-label-caps transition-all text-on-surface" placeholder="ПОИСК ПО КАТАЛОГУ..." type="text"/>
<span class="material-symbols-outlined absolute right-0 top-1/2 -translate-y-1/2 text-on-surface-variant">search</span>
</div>
</div>


<div class="md:hidden mb-6">
    <button id="filterToggleBtn" onclick="toggleFilters()" class="w-full py-4 bg-primary text-on-primary font-label-caps text-label-caps flex items-center justify-center gap-2 rounded-xl shadow-lg shadow-primary/20">
        <span class="material-symbols-outlined">filter_list</span>
        ПОКАЗАТЬ ФИЛЬТРЫ
    </button>
</div>

<div class="flex flex-col md:flex-row gap-gutter">
<!-- Sidebar Filters -->
<aside id="catalogSidebar" class="hidden md:block w-full md:w-64 flex-shrink-0 space-y-8 md:space-y-10">
<section>
<h3 class="font-label-caps text-label-caps text-on-surface mb-6 border-l-2 border-primary pl-4 tracking-widest uppercase">Категории</h3>
<div id="categoryFilters" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-1 gap-3 font-body-md text-on-surface-variant"></div>
</section>
<div class="flex flex-col gap-4">
<button onclick="resetFilters()" class="w-full py-4 border border-outline-variant/30 text-on-surface-variant font-label-caps text-label-caps hover:border-primary hover:text-primary transition-all duration-300">
СБРОСИТЬ ФИЛЬТРЫ
</button>
<div class="border border-outline-variant/10 p-6 bg-surface-container-lowest">
<p class="font-label-caps text-[10px] text-on-surface-variant mb-2 tracking-widest">ТОВАРОВ В КАТАЛОГЕ</p>
<p id="productCount" class="text-primary text-3xl font-bold">0</p>
</div>
</div>
</aside>


<!-- Product List -->
<div class="flex-1">
<div id="productGrid" class="flex flex-col gap-4"></div>
<p id="noResults" class="hidden text-center text-on-surface-variant py-20 text-lg">Товары не найдены. Попробуйте изменить фильтры.</p>

<!-- Pagination -->
<div id="pagination" class="mt-12 flex justify-center items-center gap-3"></div>
</div>
</div>
</main>

<footer id="globalFooter"></footer>

<script>
function toggleFilters() {
    const sidebar = document.getElementById('catalogSidebar');
    const btn = document.getElementById('filterToggleBtn');
    sidebar.classList.toggle('hidden');
    
    if (sidebar.classList.contains('hidden')) {
        btn.innerHTML = '<span class="material-symbols-outlined">filter_list</span> ПОКАЗАТЬ ФИЛЬТРЫ';
    } else {
        btn.innerHTML = '<span class="material-symbols-outlined">close</span> СКРЫТЬ ФИЛЬТРЫ';
    }
}

let currentPage = 1;
const itemsPerPage = 20;
let activeFilters = {
    parentCategory: [],
    category: [],
    vid: null,
    length: null,
    width: null
};
let searchQuery = '';
let filterData = { parentCategories: [], categories: {}, totalCount: 0 };
let categoryFiltersCache = {}; // categoryName -> {vids, lengths, widths}
let openSections = new Set();

async function loadFilters() {
    try {
        const res = await fetch('/api/filters');
        filterData = await res.json();
        
        if (activeFilters.category.length > 0 && activeFilters.parentCategory.length === 0) {
            activeFilters.category.forEach(catName => {
                for (const [p, cats] of Object.entries(filterData.categories)) {
                    if (cats.some(c => c.name === catName)) {
                        if (!activeFilters.parentCategory.includes(p)) activeFilters.parentCategory.push(p);
                        openSections.add(p);
                        break;
                    }
                }
            });
        }
        
        for (const cat of activeFilters.category) {
            await loadCategoryFilters(cat);
        }
        
        renderFilters();
    } catch (e) { console.error('Failed to load filters', e); }
}

async function loadCategoryFilters(category) {
    if (categoryFiltersCache[category]) return;
    try {
        const res = await fetch(`/api/category-filters?category=${encodeURIComponent(category)}`);
        categoryFiltersCache[category] = await res.json();
        renderFilters();
    } catch (e) { console.error(`Failed to load filters for ${category}`, e); }
}

async function fetchProducts() {
    const grid = document.getElementById('productGrid');
    const noResults = document.getElementById('noResults');
    const paginationDiv = document.getElementById('pagination');
    
    grid.style.opacity = '0.5';
    grid.classList.add('pointer-events-none');
    
    const params = new URLSearchParams({
        page: currentPage,
        limit: itemsPerPage
    });
    
    if (activeFilters.parentCategory.length > 0) params.append('parent_category', activeFilters.parentCategory.join(','));
    if (activeFilters.category.length > 0) params.append('category', activeFilters.category.join(','));
    if (activeFilters.vid) params.append('vid', activeFilters.vid);
    if (activeFilters.length) params.append('length', activeFilters.length);
    if (activeFilters.width) params.append('width', activeFilters.width);
    if (searchQuery) params.append('search', searchQuery);

    try {
        const res = await fetch(`/api/products?${params.toString()}`);
        const data = await res.json();
        
        grid.style.opacity = '1';
        grid.classList.remove('pointer-events-none');
        
        renderProducts(data.products);
        renderPagination(data.pagination);
        
        document.getElementById('productCount').textContent = data.pagination.total;
        
        if (data.products.length === 0) {
            noResults.classList.remove('hidden');
            paginationDiv.innerHTML = '';
        } else {
            noResults.classList.add('hidden');
        }
    } catch (e) {
        console.error('Failed to fetch products', e);
        grid.style.opacity = '1';
    }
}

function updateBreadcrumbs() {
    const nav = document.getElementById('breadcrumbs');
    let html = `
        <a class="hover:text-primary transition-colors no-underline" href="/">ГЛАВНАЯ</a>
        <span class="material-symbols-outlined text-[14px]">chevron_right</span>
        <span class="cursor-pointer hover:text-primary transition-colors" onclick="resetFilters()">КАТАЛОГ</span>
    `;
    
    if (activeFilters.parentCategory.length > 0) {
        const label = activeFilters.parentCategory.length === 1 ? activeFilters.parentCategory[0].toUpperCase() : 'НЕСКОЛЬКО КАТЕГОРИЙ';
        html += `
            <span class="material-symbols-outlined text-[14px]">chevron_right</span>
            <span class="text-on-surface">${label}</span>
        `;
    }
    
    if (activeFilters.category.length > 0) {
        const label = activeFilters.category.length === 1 ? activeFilters.category[0].toUpperCase() : `ПОДКАВТЕГОРИЙ: ${activeFilters.category.length}`;
        html += `
            <span class="material-symbols-outlined text-[14px]">chevron_right</span>
            <span class="text-on-surface">${label}</span>
        `;
    }
    
    nav.innerHTML = html;
}

function renderFilters() {
    updateBreadcrumbs();
    const container = document.getElementById('categoryFilters');
    
    let filtersHtml = filterData.parentCategories.map(p => {
        const icons = {
          'Черный металлопрокат': 'construction',
          'Листовой металлопрокат': 'layers',
          'Трубный металлопрокат': 'radio_button_unchecked',
          'Кровля и фасад': 'roofing'
        };
        const icon = icons[p] || 'inventory_2';
        const isExpanded = openSections.has(p);
        const categories = filterData.categories[p] || [];
        const isActiveParent = activeFilters.parentCategory.includes(p);
        
        return `
          <div class="mb-2">
            <div onclick="toggleSection('${p}')" class="flex justify-between items-center py-4 px-5 border ${isActiveParent ? 'border-primary bg-primary/5 text-primary' : 'border-outline-variant/10 text-on-surface-variant hover:border-primary/40 hover:bg-primary/5'} cursor-pointer transition-all group bg-surface-container-low/30 rounded-xl">
              <div class="flex items-center gap-4">
                <span class="material-symbols-outlined ${isActiveParent ? 'text-primary' : 'text-primary/60'} group-hover:text-primary transition-colors">${icon}</span>
                <span class="group-hover:text-primary transition-colors font-bold text-sm uppercase tracking-tight">${p}</span>
              </div>
              <span class="material-symbols-outlined text-[18px] transition-transform duration-300 ${isExpanded ? 'rotate-180 text-primary' : 'text-on-surface-variant/40 group-hover:text-primary'}">expand_more</span>
            </div>
            
            <div class="overflow-hidden transition-all duration-300 ${isExpanded ? 'max-h-[2000px] mt-2 opacity-1' : 'max-h-0 opacity-0'}">
              <div class="pl-4 space-y-1">
                ${categories.map(cat => {
                  const isActiveCat = activeFilters.category.includes(cat.name);
                  let catHtml = `
                    <div onclick="setFilter('category', '${cat.name}')" class="flex justify-between items-center py-2.5 px-4 rounded-lg border ${isActiveCat ? 'border-primary/50 bg-primary/10 text-primary' : 'border-transparent text-on-surface-variant hover:bg-primary/5 hover:text-primary'} cursor-pointer transition-all group">
                      <span class="font-medium text-sm">${cat.name}</span>
                      <span class="text-[10px] opacity-40">${cat.count}</span>
                    </div>
                  `;
                  
                  if (isActiveCat && categoryFiltersCache[cat.name]) {
                    const cf = categoryFiltersCache[cat.name];
                    let subFilters = `<div class="py-4 px-2 space-y-4 animate-fadeIn">`;
                    
                    const getUniqueFilters = (arr) => {
                        const groups = {};
                        arr.forEach(item => {
                            if (!item) return;
                            const str = item.toString();
                            const normalized = str.toLowerCase().replace(/окрашенный|оцинкованный|полиэстер|профнастил|односторонний|двусторонний|металлочерепица|водосток/gi, '').replace(/\s*(мм?|mm|м|m)\.?/gi, '').replace(/,/g, '.').trim();
                            if (!normalized) return;
                            if (!groups[normalized] || str.length > groups[normalized].length) groups[normalized] = str;
                        });
                        return Object.values(groups);
                    };

                    const rawSizes = [...new Set([...cf.vids, ...cf.widths])];
                    const allSizes = getUniqueFilters(rawSizes).sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));

                    if (allSizes.length > 0) {
                      subFilters += `<div>
                        <h4 class="text-[9px] uppercase tracking-widest text-on-surface-variant mb-2">РАЗМЕРЫ / ВИД</h4>
                        <select onchange="setFilterSize(this.value, '${cat.name}')" class="w-full bg-surface-container border border-outline-variant/20 text-on-surface text-xs focus:ring-primary focus:border-primary py-2.5 px-3 outline-none rounded-md cursor-pointer hover:border-primary/40 transition-all">
                          <option value="">Все размеры</option>
                          ${allSizes.map(s => {
                            const cleanLabel = s.toString().replace(/Швеллер|Балка|Арматура|Лист|Труба|Профнастил|сетка|окрашенный|оцинкованный|полиэстер|односторонний|двусторонний/gi, '').replace(/\s*(мм?|mm|м|m)\.?/gi, '').trim();
                            return `<option value="${s}" ${activeFilters.vid === s || activeFilters.width === s ? 'selected' : ''}>${cleanLabel || s}</option>`;
                          }).join('')}
                        </select>
                      </div>`;
                    }

                    if (cf.lengths.length > 0 && p !== 'Кровля и фасад') {
                      const uniqueLengths = getUniqueFilters(cf.lengths).sort((a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' }));
                      subFilters += `<div>
                        <h4 class="text-[9px] uppercase tracking-widest text-on-surface-variant mb-2">ДЛИНА</h4>
                        <select onchange="setFilter('length', this.value)" class="w-full bg-surface-container border border-outline-variant/20 text-on-surface text-xs focus:ring-primary focus:border-primary py-2.5 px-3 outline-none rounded-md cursor-pointer hover:border-primary/40 transition-all">
                          <option value="">Любая длина</option>
                          ${uniqueLengths.map(l => `<option value="${l}" ${activeFilters.length === l ? 'selected' : ''}>${l}</option>`).join('')}
                        </select>
                      </div>`;
                    }
                    
                    subFilters += `</div>`;
                    catHtml += subFilters;
                  }
                  
                  return catHtml;
                }).join('')}
              </div>
            </div>
          </div>
        `;
    }).join('');

    container.innerHTML = filtersHtml;
}

function toggleSection(section) {
    const categories = filterData.categories[section] || [];
    const idx = activeFilters.parentCategory.indexOf(section);
    
    if (idx > -1) {
        activeFilters.parentCategory.splice(idx, 1);
        openSections.delete(section);
        // Remove all its subcategories
        categories.forEach(cat => {
            const cIdx = activeFilters.category.indexOf(cat.name);
            if (cIdx > -1) activeFilters.category.splice(cIdx, 1);
        });
    } else {
        activeFilters.parentCategory.push(section);
        openSections.add(section);
        // Add all its subcategories
        categories.forEach(cat => {
            if (!activeFilters.category.includes(cat.name)) {
                activeFilters.category.push(cat.name);
                loadCategoryFilters(cat.name);
            }
        });
    }
    renderFilters();
    applyFilters();
}

function applyFilters() {
    currentPage = 1;
    fetchProducts();
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setFilterSize(value, catName) {
    if (!value) {
        activeFilters.vid = null;
        activeFilters.width = null;
    } else {
        const cf = categoryFiltersCache[catName];
        if (cf) {
            const isVid = cf.vids.includes(value);
            const isWidth = cf.widths.includes(value);
            activeFilters.vid = isVid ? value : null;
            activeFilters.width = isWidth ? value : null;
        }
    }
    renderFilters();
    applyFilters();
}

function setFilter(key, value) {
    if (key === 'category') {
        const idx = activeFilters.category.indexOf(value);
        if (idx > -1) {
            activeFilters.category.splice(idx, 1);
        } else {
            activeFilters.category.push(value);
            loadCategoryFilters(value);
        }
        activeFilters.vid = null;
        activeFilters.length = null;
        activeFilters.width = null;
        renderFilters();
        applyFilters();
    } else {
        activeFilters[key] = value || null;
        renderFilters();
        applyFilters();
    }
}

function resetFilters() {
  activeFilters = { parentCategory: [], category: [], vid: null, length: null, width: null };
  searchQuery = '';
  currentPage = 1;
  document.getElementById('searchInput').value = '';
  openSections.clear();
  categoryFiltersCache = {};
  renderFilters();
  fetchProducts();
}

function renderProducts(products) {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map((p, i) => `
    <div class="card-enter border border-outline-variant/10 p-4 md:p-6 pink-glow bg-surface-container-lowest flex flex-col md:flex-row items-center gap-6 group transition-all duration-500 cursor-pointer no-underline text-inherit relative" style="animation-delay:${i * 20}ms">
      <a href="/product?id=${p.id}" class="absolute inset-0 z-0"></a>
      
      <div class="flex-1 min-w-0 z-10 pointer-events-none">
        <div class="flex items-center gap-3 mb-1">
          <span class="bg-primary/10 text-primary text-[10px] font-label-caps px-2 py-0.5 border border-primary/20">${p.category.toUpperCase()}</span>
          ${p.variantCount > 1 ? `<span class="bg-white/5 text-on-surface-variant text-[9px] font-label-caps px-2 py-0.5 border border-white/5">${p.variantCount} ВАРИАНТОВ</span>` : ''}
        </div>
        <h4 class="font-headline-md text-lg md:text-xl font-semibold text-on-surface group-hover:text-primary transition-colors truncate">${p.name}</h4>
        <div class="flex flex-wrap gap-4 mt-2">
            <p class="text-on-surface-variant text-xs flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[16px] opacity-40">verified</span> ${p.steel || 'Ст3'}
            </p>
            <p class="text-on-surface-variant text-xs flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[16px] opacity-40">straighten</span> ${p.length || 'Немерная'}
            </p>
            <p class="text-on-surface-variant text-xs flex items-center gap-1.5">
                <span class="material-symbols-outlined text-[16px] opacity-40">inventory_2</span> ${p.standard || 'ГОСТ'}
            </p>
        </div>
      </div>

      <div class="w-full md:w-auto flex flex-row md:flex-col items-end justify-between md:justify-center gap-4 md:text-right z-10 pointer-events-none">
        <div>
            <p class="font-label-caps text-[9px] text-on-surface-variant mb-0.5 uppercase tracking-widest">${p.price_ton ? 'ЦЕНА ЗА ТОННУ' : 'ЦЕНА'}</p>
            <p class="text-primary text-xl md:text-2xl font-bold tracking-tight leading-none">${p.priceTon} ₽</p>
        </div>
        <div class="md:border-t md:border-outline-variant/10 md:pt-2">
            <p class="font-label-caps text-[9px] text-on-surface-variant mb-0.5 uppercase tracking-widest">${p.unitLabel}</p>
            <p class="text-on-surface font-semibold text-sm leading-none">${p.priceUnit} ₽</p>
        </div>
      </div>

      <div class="w-full md:w-72 flex items-center gap-2 z-10">
        <div class="flex-1 flex items-center bg-surface-container border border-outline-variant/10 overflow-hidden h-11">
            <input type="text" id="qty-${p.id}" value="1.00" inputmode="decimal" class="w-16 bg-transparent border-none text-left pl-3 font-bold text-on-surface outline-none text-sm h-full"/>
            <span class="text-[9px] font-label-caps text-on-surface-variant uppercase tracking-widest flex-1 opacity-60">${p.price_ton ? 'Т' : 'ЕД.'}</span>
            <div class="flex flex-col h-full w-10 border-l border-white/5 bg-white/5">
                <button onclick="event.stopPropagation(); changeQty('${p.id}', 1)" class="flex-1 flex items-center justify-center hover:bg-primary/20 transition-colors border-b border-white/5 group">
                    <span class="material-symbols-outlined text-primary text-[18px] group-hover:scale-125 transition-transform">expand_less</span>
                </button>
                <button onclick="event.stopPropagation(); changeQty('${p.id}', -1)" class="flex-1 flex items-center justify-center hover:bg-primary/20 transition-colors group">
                    <span class="material-symbols-outlined text-primary text-[18px] group-hover:scale-125 transition-transform">expand_more</span>
                </button>
            </div>
        </div>
        <button onclick="event.stopPropagation(); addToCart('${p.id}')" class="w-12 h-11 bg-primary text-on-primary flex items-center justify-center hover:bg-primary/90 transition-all pink-glow">
            <span class="material-symbols-outlined">shopping_cart</span>
        </button>
      </div>
    </div>
  `).join('');
}

function renderPagination(nav) {
    const div = document.getElementById('pagination');
    if (nav.pages <= 1) {
        div.innerHTML = '';
        return;
    }
    
    let html = `
        <button onclick="changePage(${nav.page - 1})" ${nav.page === 1 ? 'disabled' : ''} class="w-10 h-10 border border-outline-variant/20 flex items-center justify-center hover:border-primary disabled:opacity-20 transition-colors">
            <span class="material-symbols-outlined">chevron_left</span>
        </button>
    `;
    
    for (let i = 1; i <= nav.pages; i++) {
        if (i === 1 || i === nav.pages || (i >= nav.page - 1 && i <= nav.page + 1)) {
            html += `<button onclick="changePage(${i})" class="w-10 h-10 border ${nav.page === i ? 'border-primary bg-primary/10 text-primary' : 'border-outline-variant/20'} flex items-center justify-center hover:border-primary transition-colors font-label-caps text-xs">${i}</button>`;
        } else if (i === nav.page - 2 || i === nav.page + 2) {
            html += `<span class="opacity-30">...</span>`;
        }
    }
    
    html += `
        <button onclick="changePage(${nav.page + 1})" ${nav.page === nav.pages ? 'disabled' : ''} class="w-10 h-10 border border-outline-variant/20 flex items-center justify-center hover:border-primary disabled:opacity-20 transition-colors">
            <span class="material-symbols-outlined">chevron_right</span>
        </button>
    `;
    div.innerHTML = html;
}

function changePage(p) {
    currentPage = p;
    window.scrollTo({ top: 0, behavior: 'smooth' });
    fetchProducts();
}

window.changeQty = function(id, delta) {
    const input = document.getElementById('qty-' + id);
    if (!input) return;
    let val = parseFloat(input.value.replace(',', '.')) || 1;
    const unitText = input.nextElementSibling.textContent;
    const step = unitText === 'Т' ? 0.1 : 1;
    
    if (unitText === 'Т' && delta > 0 && val >= 1000) {
        alert("Максимум 1000 т в одном заказе. Для более крупного заказа оставьте заявку.");
        return;
    }
    
    val = Math.max(0, val + (delta * step));
    if (unitText === 'Т') val = Math.min(1000, val);
    input.value = val.toFixed(2);
};

document.getElementById('searchInput').addEventListener('input', (e) => {
  searchQuery = e.target.value.toLowerCase();
  currentPage = 1;
  fetchProducts();
});

async function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const pcatParam = urlParams.get('pcat');
    if (pcatParam) {
        const decoded = decodeURIComponent(pcatParam);
        activeFilters.parentCategory = decoded.includes(',') ? decoded.split(',') : [decoded];
        activeFilters.parentCategory.forEach(p => openSections.add(p));
    }
    
    const catParam = urlParams.get('cat');
    if (catParam) {
        const decoded = decodeURIComponent(catParam);
        activeFilters.category = decoded.includes(',') ? decoded.split(',') : [decoded];
        for (const cat of activeFilters.category) await loadCategoryFilters(cat);
    }
    
    const searchParam = urlParams.get('search');
    if (searchParam) {
        searchQuery = decodeURIComponent(searchParam).toLowerCase();
        document.getElementById('searchInput').value = searchQuery;
    }

    await loadFilters();
    fetchProducts();
}

init();

function updateCartBadge() {
  if (window.updateGlobalCartBadge) window.updateGlobalCartBadge();
}

function addToCart(id) {
  fetch(`/api/products/${id}`).then(res => res.json()).then(p => {
    let cart = JSON.parse(localStorage.getItem('metal_cart') || '[]');
    const qtyInput = document.getElementById('qty-' + id);
    const qty = qtyInput ? parseFloat(qtyInput.value) : 1;
    
    let price, unit, finalQty;
    if (p.price_ton) {
        price = p.price_ton;
        unit = 'т';
        finalQty = qty;
    } else {
        price = p.price_unit;
        unit = p.unit_label.split(' ')[1] || 'ед.';
        finalQty = qty;
    }
    
    const existing = cart.find(item => item.id === id);
    if (existing) {
      existing.qty = (parseFloat(existing.qty) + finalQty).toFixed(2);
    } else {
      cart.push({ 
        id: id, 
        qty: finalQty.toFixed(2),
        name: p.name,
        price: price,
        unit: unit
      });
    }
    localStorage.setItem('metal_cart', JSON.stringify(cart));
    if (window.updateGlobalCartBadge) window.updateGlobalCartBadge();
    if (window.toggleCartDrawerGlobal) window.toggleCartDrawerGlobal();
    
    const toast = document.createElement('div');
    toast.className = 'fixed bottom-8 right-8 bg-primary text-on-primary px-6 py-3 font-label-caps text-sm shadow-2xl z-[100]';
    toast.textContent = 'ТОВАР ДОБАВЛЕН В КОРЗИНУ';
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  });
}

function toggleAuthModal() {
    window.location.href = '/';
}

updateCartBadge();
</script>
